---
# .cpanel.yml — cPanel Git Version Control deployment
#
# Configure via cPanel → Git Version Control → Manage → Pull or Deploy.
# Push your repo to the cPanel bare repository and cPanel will run these tasks.
#
# Target: /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/
#
# Safety guarantee: comedy.db is NEVER touched if it already exists.
# First-time deploy: init_db.php is run automatically to create the database.

deployment:
  tasks:
    # ── 1. Ensure directory exists ──────────────────────────────────────────
    - /bin/mkdir -p /home/a2bremov/davidswinstead.com/misc/goodbitshitbit

    # ── 2. Copy application files (comedy.db is intentionally not copied) ──
    - /bin/cp index.php    /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/index.php
    - /bin/cp init_db.php  /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/init_db.php
    - /bin/cp .htaccess    /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/.htaccess
    - /bin/cp .htpasswd    /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/.htpasswd

    # ── 3. Permissions ──────────────────────────────────────────────────────
    # Directories: traversable by web server
    - /bin/find /home/a2bremov/davidswinstead.com/misc/goodbitshitbit -type d -exec chmod 755 {} +

    # PHP + .htaccess: readable by web server, not world-writable
    - /bin/find /home/a2bremov/davidswinstead.com/misc/goodbitshitbit -type f -name "*.php"    -exec chmod 644 {} +
    - /bin/find /home/a2bremov/davidswinstead.com/misc/goodbitshitbit -type f -name ".htaccess" -exec chmod 644 {} +

    # .htpasswd: owner+group read only (Apache reads it as the owner on most cPanel hosts)
    - /bin/chmod 640 /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/.htpasswd

    # ── 4. Patch AuthUserFile to the live absolute server path ────────────
    - /bin/sed -i "s|^AuthUserFile .*|AuthUserFile /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/.htpasswd|" /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/.htaccess

    # ── 5. Initialise DB on first deploy only; preserve it on all others ──
    # If comedy.db already exists: skip entirely (data preserved).
    # If comedy.db does not exist: run init_db.php to create tables.
    - /bin/bash -c 'test -f /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/comedy.db || php /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/init_db.php'

    # ── 6. Ensure DB is writable by web server (PHP needs read+write) ──────
    - /bin/bash -c 'test -f /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/comedy.db && chmod 664 /home/a2bremov/davidswinstead.com/misc/goodbitshitbit/comedy.db || true'
